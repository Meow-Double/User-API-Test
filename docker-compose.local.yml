services:
  postgres:
    container_name: user-api_db 
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-userapi}
    ports:
      - '5432:5432' 
    volumes:
      - 'pgdata:/var/lib/postgresql/data'
    healthcheck: 
      test: ['CMD-SHELL', 'pg_isready -U postgres -d userapi']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    container_name: user-api_server 
    build: .
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_URI: ${POSTGRES_URI:-postgresql://postgres:dev_password_123@postgres:5432/userapi?schema=public}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000' 
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/main.js"

volumes:
  pgdata: